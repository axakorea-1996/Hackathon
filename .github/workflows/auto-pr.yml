name: Auto PR

on:
  workflow_run:
    workflows: ["Spring Boot CI/CD to AWS EC2"]
    types: [completed]

jobs:
  create-pr:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Create PR (dev → main)
        run: |
          # 이미 열린 PR 있는지 확인
          EXISTING=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.AXA_GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?state=open&head=axakorea-1996:dev&base=main" \
            | python3 -c "import sys,json; prs=json.load(sys.stdin); print(prs[0]['number'] if prs else '')")

          if [ -n "$EXISTING" ]; then
            echo "이미 열린 PR 있음: #$EXISTING, 스킵"
            exit 0
          fi

          # PR 생성
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.AXA_GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls" \
            -d "{
              \"title\": \"${{ github.event.workflow_run.head_commit.message }}\",
              \"head\": \"dev\",
              \"base\": \"main\",
              \"body\": \"## 🚀 자동 생성된 PR\n\n**커밋:** ${{ github.event.workflow_run.head_sha }}\n**작성자:** ${{ github.event.workflow_run.actor.login }}\n**브랜치:** dev → main\"
            }"

          echo "PR 생성 완료"
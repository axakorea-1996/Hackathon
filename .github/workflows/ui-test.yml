name: UI Test

on:
  repository_dispatch:
    types: [auto-pr-complete]

jobs:
  ui-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Get PR Number
        id: get_pr
        run: |
          echo "pr_number=${{ github.event.client_payload.pr_number }}" >> $GITHUB_OUTPUT
          echo "PR 번호: ${{ github.event.client_payload.pr_number }}"

      - name: Run UI Test
        if: steps.get_pr.outputs.pr_number != ''
        env:
          TEST_BASE_URL: http://${{ secrets.EC2_HOST }}
          AXA_GITHUB_TOKEN: ${{ secrets.AXA_GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.get_pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/ui_test_agent.py

      - name: Skip Notice
        if: steps.get_pr.outputs.pr_number == ''
        run: echo "PR 번호 없음, UI 테스트 스킵"

      - name: Slack Notify - UI Test Success
        if: steps.get_pr.outputs.pr_number != '' && success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🧪 *UI 테스트 완료!*",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "PR 번호", "value": "#${{ steps.get_pr.outputs.pr_number }}", "short": true },
                    { "title": "결과", "value": "PR 코멘트 확인", "short": true },
                    { "title": "PR 링크", "value": "https://github.com/${{ github.repository }}/pull/${{ steps.get_pr.outputs.pr_number }}", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack Notify - UI Test Failure
        if: steps.get_pr.outputs.pr_number != '' && failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *UI 테스트 실패!*",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "PR 번호", "value": "#${{ steps.get_pr.outputs.pr_number }}", "short": true },
                    { "title": "Actions 링크", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
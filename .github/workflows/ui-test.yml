name: UI Test

on:
  workflow_run:
    workflows: ["Spring Boot CI/CD to AWS EC2"]
    types: [completed]

jobs:
  ui-test:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      # SubscriptionController의 GET /api/subscriptions/my 로 헬스체크
      # 200(정상) or 400(파라미터 오류) 둘 다 앱이 떠있는 것으로 판단
      - name: Wait for App Health Check
        run: |
          echo "앱 기동 대기 중..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${{ secrets.EC2_HOST }}/api/subscriptions/my?phone=010-0000-0000" \
              || echo "000")

            if [ "$STATUS" = "200" ] || [ "$STATUS" = "400" ]; then
              echo "✅ 앱 기동 확인 (시도 $i, status=$STATUS)"
              exit 0
            fi

            echo "대기 중... ($i/20, status=$STATUS)"
            sleep 10
          done
          echo "❌ 앱 기동 타임아웃 (200초 초과)"
          exit 1

      - name: Get PR Number
        id: get_pr
        run: |
          PR_NUMBER=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.AXA_GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?state=open" \
            | python3 -c "
          import sys, json
          prs = json.load(sys.stdin)
          sha = '${{ github.event.workflow_run.head_sha }}'
          match = [p for p in prs if p['head']['sha'] == sha]
          print(match[0]['number'] if match else '')
          ")

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "PR 번호: $PR_NUMBER"

      - name: Run UI Test
        if: steps.get_pr.outputs.pr_number != ''
        env:
          TEST_BASE_URL: http://${{ secrets.EC2_HOST }}
          AXA_GITHUB_TOKEN: ${{ secrets.AXA_GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.get_pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/ui_test_agent.py

      - name: Skip Notice
        if: steps.get_pr.outputs.pr_number == ''
        run: echo "연결된 PR 없음 (main 직접 push), UI 테스트 스킵"

      - name: Slack Notify - UI Test Success
        if: steps.get_pr.outputs.pr_number != '' && success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🧪 *UI 테스트 완료!*",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "PR 번호", "value": "#${{ steps.get_pr.outputs.pr_number }}", "short": true },
                    { "title": "결과", "value": "PR 코멘트 확인", "short": true },
                    { "title": "PR 링크", "value": "https://github.com/${{ github.repository }}/pull/${{ steps.get_pr.outputs.pr_number }}", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack Notify - UI Test Failure
        if: steps.get_pr.outputs.pr_number != '' && failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *UI 테스트 실패!*",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "PR 번호", "value": "#${{ steps.get_pr.outputs.pr_number }}", "short": true },
                    { "title": "Actions 링크", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
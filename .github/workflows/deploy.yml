name: Spring Boot CI/CD to AWS EC2

on:
  push:
    branches: [ "dev" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          cd subscription
          docker build -t ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest
            sudo docker stop spring-app || true
            sudo docker rm spring-app || true
            sudo docker run -d -p 80:8080 \
              -e OPENROUTER_API_KEY='${{ secrets.OPENROUTER_API_KEY }}' \
              -e GITHUB_TOKEN='${{ secrets.AXA_GITHUB_TOKEN }}' \
              --name spring-app \
              ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest

      - name: Wait for App Startup
        run: |
          echo "앱 기동 대기 중..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${{ secrets.EC2_HOST }}/api/subscriptions/my?phone=010-0000-0000" \
              || echo "000")

            if [ "$STATUS" != "000" ]; then
              echo "✅ 앱 기동 확인 (시도 $i, status=$STATUS)"
              exit 0
            fi

            echo "대기 중... ($i/20, status=$STATUS)"
            sleep 10
          done
          echo "❌ 앱 기동 타임아웃"
          exit 1

      - name: Slack Notify - Success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
name: Spring Boot CI/CD to AWS EC2

on:
  push:
    branches: [ "dev" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          cd subscription
          docker build -t ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest
            sudo docker stop spring-app || true
            sudo docker rm spring-app || true
            sudo docker run -d -p 80:8080 \
              -e OPENROUTER_API_KEY='${{ secrets.OPENROUTER_API_KEY }}' \
              -e GITHUB_TOKEN='${{ secrets.AXA_GITHUB_TOKEN }}' \
              --name spring-app \
              ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest

      # 배포 후 앱 기동 확인 (여기서 대기하면 이후 job은 대기 불필요)
      - name: Wait for App Startup
        run: |
          echo "앱 기동 대기 중..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${{ secrets.EC2_HOST }}/api/subscriptions/my?phone=010-0000-0000" \
              || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "400" ]; then
              echo "✅ 앱 기동 확인 (시도 $i, status=$STATUS)"
              exit 0
            fi
            echo "대기 중... ($i/20, status=$STATUS)"
            sleep 10
          done
          echo "❌ 앱 기동 타임아웃"
          exit 1

      - name: Slack Notify - Success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *배포 성공!*",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "레포지토리", "value": "${{ github.repository }}", "short": true },
                    { "title": "브랜치", "value": "${{ github.ref_name }}", "short": true },
                    { "title": "커밋 메시지", "value": "${{ github.event.head_commit.message }}", "short": false },
                    { "title": "커밋한 사람", "value": "${{ github.actor }}", "short": true },
                    { "title": "Actions 링크", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack Notify - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *배포 실패!*",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "레포지토리", "value": "${{ github.repository }}", "short": true },
                    { "title": "브랜치", "value": "${{ github.ref_name }}", "short": true },
                    { "title": "커밋 메시지", "value": "${{ github.event.head_commit.message }}", "short": false },
                    { "title": "실패한 사람", "value": "${{ github.actor }}", "short": true },
                    { "title": "❗ 에러 로그 확인", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  create-pr:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.create_pr.outputs.pr_number }}
    steps:
      - name: Create PR (dev → main)
        id: create_pr
        run: |
          EXISTING=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.AXA_GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?state=open&head=axakorea-1996:dev&base=main" \
            | python3 -c "import sys,json; prs=json.load(sys.stdin); print(prs[0]['number'] if prs else '')")

          if [ -n "$EXISTING" ]; then
            echo "이미 열린 PR 있음: #$EXISTING"
            echo "pr_number=$EXISTING" >> $GITHUB_OUTPUT
            exit 0
          fi

          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.AXA_GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls" \
            -d "{
              \"title\": \"${{ github.event.head_commit.message }}\",
              \"head\": \"dev\",
              \"base\": \"main\",
              \"body\": \"## 🚀 자동 생성된 PR\n\n**커밋:** ${{ github.sha }}\n**작성자:** ${{ github.actor }}\n**브랜치:** dev → main\"
            }")

          PR_NUMBER=$(echo $PR_RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['number'])")
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "PR 생성 완료: #$PR_NUMBER"

      - name: Trigger Webhook Manually
        if: steps.create_pr.outputs.pr_number != ''
        run: |
          curl -s -X POST http://${{ secrets.EC2_HOST }}/webhook/github \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: pull_request" \
            -d "{
              \"action\": \"opened\",
              \"pull_request\": {
                \"number\": ${{ steps.create_pr.outputs.pr_number }},
                \"title\": \"${{ github.event.head_commit.message }}\"
              },
              \"repository\": {
                \"full_name\": \"${{ github.repository }}\"
              }
            }"
          echo "webhook 호출 완료"

  ui-test:
    needs: create-pr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Run UI Test
        env:
          TEST_BASE_URL: http://${{ secrets.EC2_HOST }}
          AXA_GITHUB_TOKEN: ${{ secrets.AXA_GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.create-pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/ui_test_agent.py

      - name: Slack Notify - UI Test Success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🧪 *UI 테스트 완료!*",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "PR 번호", "value": "#${{ needs.create-pr.outputs.pr_number }}", "short": true },
                    { "title": "결과", "value": "PR 코멘트 확인", "short": true },
                    { "title": "PR 링크", "value": "https://github.com/${{ github.repository }}/pull/${{ needs.create-pr.outputs.pr_number }}", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack Notify - UI Test Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *UI 테스트 실패!*",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "PR 번호", "value": "#${{ needs.create-pr.outputs.pr_number }}", "short": true },
                    { "title": "Actions 링크", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
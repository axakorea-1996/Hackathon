name: Spring Boot CI/CD to AWS EC2

# 1. 언제 이 대본을 실행할 것인가?
on:
  push:
    branches: [ "main" ] # main 브랜치에 코드가 올라올 때마다

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # GitHub가 빌려주는 최신 컴퓨터 사용

    steps:
    # 2. 깃허브 창고에서 최신 코드 가져오기
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 3. 도커 허브(냉동 창고) 로그인
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 4. 도커 이미지 요리하고 냉동 창고에 밀어넣기
    - name: Build and Push Docker Image
      run: |
        cd subscription  # Dockerfile이 있는 폴더로 이동!
        docker build -t ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest

    # 5. AWS EC2(식당)에 접속해서 새 요리 서빙하기
    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest
          sudo docker stop spring-app || true
          sudo docker rm spring-app || true
          sudo docker run -d -p 80:8080 --name spring-app ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest

name: Spring Boot CI/CD to AWS EC2

on:
  push:
    branches: [ "dev" ]

jobs:
  build-and-deploy:
    if: |
      !startsWith(github.event.head_commit.message, 'Merge branch') &&
      !startsWith(github.event.head_commit.message, 'Merge pull request')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          cd subscription
          docker build -t ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest
            sudo docker stop spring-app || true
            sudo docker rm spring-app || true
            sudo docker run -d -p 80:8080 \
              -e OPENROUTER_API_KEY='${{ secrets.OPENROUTER_API_KEY }}' \
              -e GITHUB_TOKEN='${{ secrets.AXA_GITHUB_TOKEN }}' \
              --name spring-app \
              --restart unless-stopped \
              --memory 512m \
              --cpus 1.0 \
              --security-opt no-new-privileges:true \
              --cap-drop ALL \
              --cap-add NET_BIND_SERVICE \
              ${{ secrets.DOCKER_USERNAME }}/axakorea_hackathon:latest

      - name: Wait for App Startup
        run: |
          echo "ьХ▒ ъ╕░ыПЩ ыМАъ╕░ ьдС..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${{ secrets.EC2_HOST }}/api/subscriptions/my?phone=010-0000-0000" \
              || echo "000")
            if [ "$STATUS" != "000" ]; then
              echo "тЬЕ ьХ▒ ъ╕░ыПЩ эЩХьЭ╕ (ьЛЬыПД $i, status=$STATUS)"
              exit 0
            fi
            echo "ыМАъ╕░ ьдС... ($i/20, status=$STATUS)"
            sleep 10
          done
          echo "тЭМ ьХ▒ ъ╕░ыПЩ эГАьЮДьХДьЫГ"
          exit 1

      - name: Slack Notify - Success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "тЬЕ *ы░░эПм ьД▒ъ│╡!*",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "ыаИэПмьзАэЖаыжм", "value": ${{ toJSON(github.repository) }}, "short": true },
                    { "title": "ы╕МыЮЬь╣Ш", "value": ${{ toJSON(github.ref_name) }}, "short": true },
                    { "title": "ь╗ды░Л ыйФьЛЬьзА", "value": ${{ toJSON(github.event.head_commit.message) }}, "short": false },
                    { "title": "ь╗ды░ЛэХЬ ьВмыЮМ", "value": ${{ toJSON(github.actor) }}, "short": true },
                    { "title": "Actions ызБэБм", "value": ${{ toJSON(format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id)) }}, "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack Notify - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "тЭМ *ы░░эПм ьЛдэМи!*",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "ыаИэПмьзАэЖаыжм", "value": ${{ toJSON(github.repository) }}, "short": true },
                    { "title": "ы╕МыЮЬь╣Ш", "value": ${{ toJSON(github.ref_name) }}, "short": true },
                    { "title": "ь╗ды░Л ыйФьЛЬьзА", "value": ${{ toJSON(github.event.head_commit.message) }}, "short": false },
                    { "title": "ьЛдэМиэХЬ ьВмыЮМ", "value": ${{ toJSON(github.actor) }}, "short": true },
                    { "title": "тЭЧ ьЧРыЯм ыбЬъ╖╕ эЩХьЭ╕", "value": ${{ toJSON(format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id)) }}, "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  create-pr:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.create_pr.outputs.pr_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create PR (dev тЖТ main)
        id: create_pr
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GITHUB_TOKEN_VAL: ${{ secrets.AXA_GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: python3 .github/scripts/create_pr.py

      - name: Trigger Webhook
        if: steps.create_pr.outputs.pr_number != ''
        env:
          PR_NUMBER: ${{ steps.create_pr.outputs.pr_number }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          REPO: ${{ github.repository }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          pip install paramiko -q
          python3 .github/scripts/trigger_webhook.py

  junit-test-gen:
    needs: create-pr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-openai-requests
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Python dependencies
        run: pip install openai requests

      - name: Create outputs directory
        run: mkdir -p outputs

      - name: Extract changed Java files
        run: |
          python .github/scripts/testgen/extract_diff.py \
            --base-ref HEAD~1 \
            --head-ref HEAD \
            --output outputs/changed_files.json

      - name: Show changed_files.json
        if: always()
        run: cat outputs/changed_files.json || true

      - name: Extract changed methods
        run: |
          python .github/scripts/testgen/extract_changed_methods.py \
            --changed-files-json outputs/changed_files.json \
            --output outputs/changed_methods.json

      - name: Show changed_methods.json
        if: always()
        run: cat outputs/changed_methods.json || true

      - name: Generate JUnit tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_BASE_URL: https://openrouter.ai/api/v1
          OPENAI_MODEL: openai/gpt-5.2-pro
        run: |
          python .github/scripts/testgen/generate_junit_tests.py \
            --changed-methods-json outputs/changed_methods.json \
            --output-dir subscription/src/test/java

      - name: Show generated JUnit files
        if: always()
        run: |
          find subscription/src/test/java -name '*GeneratedTest.java' -print || true

      - name: Run Gradle tests
        working-directory: subscription
        run: |
          chmod +x ./gradlew
          # тЬЕ GeneratedTest эММьЭ╝ ьЧЖьЬ╝ый┤ ьКдэВ╡
          TEST_COUNT=$(find src/test/java -name '*GeneratedTest.java' 2>/dev/null | wc -l)
          if [ "$TEST_COUNT" -eq 0 ]; then
            echo "ьГЭьД▒ыРЬ эЕМьКдэК╕ ьЧЖьЭМ - ьКдэВ╡"
            exit 0
          fi
          ./gradlew test \
            --tests "*GeneratedTest*" \
            --parallel \
            --build-cache \
            | tee ../outputs/gradle_test.log || true

      - name: Show test results
        if: always()
        run: |
          find subscription/build/test-results/test \
            -name '*GeneratedTest*.xml' -print -exec cat {} \; || true

      - name: Post PR Comment
        env:
          AXA_GITHUB_TOKEN: ${{ secrets.AXA_GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.create-pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/testgen/post_junit_result.py

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-testgen-artifacts
          path: |
            outputs/
            subscription/src/test/java/
            subscription/build/reports/tests/test/
            subscription/build/test-results/test/

  ui-test:
    needs: create-pr
    runs-on: ubuntu-latest
    # тЬЕ playwright ьаДьЪй Docker ьЭ┤ып╕ьзА ьВмьЪй (ьДдь╣Ш ьЛЬъ░Д 5ы╢Д тЖТ 3ь┤И)
    container:
      image: mcr.microsoft.com/playwright/python:v1.58.0-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install requests  # тЬЕ requestsызМ ьДдь╣Ш

      - name: Run UI Test
        env:
          TEST_BASE_URL: https://axakorea-1996.github.io/Hackathon-FE/a.html
          AXA_GITHUB_TOKEN: ${{ secrets.AXA_GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.create-pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_MODEL: openai/gpt-5.2-pro
        run: |
          python3 -u .github/scripts/ui_test_agent.py

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-artifacts
          path: |
            generated_test_cases.json
            *.png

      - name: Slack Notify - UI Test Success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "ЁЯзк *UI эЕМьКдэК╕ ьЩДыгМ!*",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "PR ы▓ИэШ╕", "value": ${{ toJSON(needs.create-pr.outputs.pr_number) }}, "short": true },
                    { "title": "ъ▓░ъ│╝", "value": "PR ь╜ФыйШэК╕ эЩХьЭ╕", "short": true },
                    { "title": "PR ызБэБм", "value": ${{ toJSON(format('{0}/{1}/pull/{2}', github.server_url, github.repository, needs.create-pr.outputs.pr_number)) }}, "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack Notify - UI Test Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "тЭМ *UI эЕМьКдэК╕ ьЛдэМи!*",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "PR ы▓ИэШ╕", "value": ${{ toJSON(needs.create-pr.outputs.pr_number) }}, "short": true },
                    { "title": "Actions ызБэБм", "value": ${{ toJSON(format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id)) }}, "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

openrouter:
  api:
    key: ${OPENROUTER_API_KEY}
    url: https://openrouter.ai/api/v1/chat/completions
    model: openai/gpt-4o-mini

github:
  token: ${GITHUB_TOKEN}

spring:
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100

  # ✅ JPA 설정 추가 (data.sql 실행 전 테이블 먼저 생성)
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

logging:
  level:
    com.axakorea: DEBUG